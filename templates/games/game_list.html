{% extends "base.html" %}
{% load static %}

{% block title %}Games{% endblock %}
{% block header_title %}Games 🎮{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/games.css' %}">
<style>
    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
        max-width: 800px;
        margin: 0 auto;
        padding: 1rem;
    }

    .game-card {
        background: white;
        border-radius: 16px;
        padding: 1.5rem;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        text-align: center;
        text-decoration: none;
        color: inherit;
        transition: transform 0.15s, box-shadow 0.15s;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
    }

    .game-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .game-card .game-emoji {
        font-size: 3rem;
    }

    .game-card .game-name {
        font-size: 1.1rem;
        font-weight: 600;
    }

    .game-card .game-desc {
        font-size: 0.85rem;
        color: #666;
    }
</style>
{% endblock %}

{% block content %}
<div class="games-grid">
    <a href="{% url 'games:story-builder' %}" class="game-card">
        <span class="game-emoji">📖</span>
        <span class="game-name">Story Builder</span>
        <span class="game-desc">Build a story together with AI!</span>
    </a>
</div>
{% endblock %}

{% block nav %}
<a href="/phonics/" class="nav-item" aria-label="Learn">
    <span class="nav-icon">📚</span>
    <span>Learn</span>
</a>
<a href="/games/" class="nav-item active" aria-label="Games">
    <span class="nav-icon">🎮</span>
    <span>Games</span>
</a>
{% endblock %}
